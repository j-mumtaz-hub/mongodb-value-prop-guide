*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #00131A;
  color: #E8F4F0;

  line-height: 1.6;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Header ── */
header {
  background: #082231;
  border-bottom: 1px solid #0D3347;
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo-mark {
  width: 28px; height: 28px;
  background: #00ED64;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { width: 16px; height: 16px; }
.header-title { font-size: 1rem; font-weight: 700; color: #fff; }
.header-sub { font-size: 0.75rem; color: #7AACBD; margin-left: auto; letter-spacing: 0.04em; }

/* ── Layout ── */
.main { display: flex; flex: 1; }

/* ── Sidebar ── */
.sidebar {
  width: 210px;
  background: #082231;
  border-right: 1px solid #0D3347;
  padding: 16px 0 32px;
  flex-shrink: 0;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.sidebar-section { margin-bottom: 6px; }
.sidebar-section-label {
  font-size: 0.63rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #7AACBD;
  padding: 10px 16px 4px;
}
.sidebar-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  color: #B8D8E8;
  font-size: 0.82rem;
  padding: 7px 16px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sidebar-btn:hover { background: rgba(0,237,100,0.06); color: #fff; }
.sidebar-btn.active {
  background: rgba(0,237,100,0.10);
  color: #00ED64;
  border-left-color: #00ED64;
  font-weight: 600;
}

/* ── Content ── */
.content { flex: 1; padding: 28px 32px; max-width: 1080px; }

/* ── Section headings ── */
.section-heading { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
.section-sub { font-size: 0.82rem; color: #7AACBD; margin-bottom: 22px; }

/* ── Cards ── */
.card {
  background: #082231;
  border: 1px solid #0D3347;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 14px;
}
.card-title { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
.card-tagline { font-size: 0.78rem; color: #00ED64; font-weight: 600; margin-bottom: 12px; }

/* ── Grid layouts ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }

.product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
@media (max-width: 900px) { .product-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 580px) { .product-grid { grid-template-columns: 1fr; } }

/* ── Product mini cards ── */
.product-mini {
  background: #0A1E2B;
  border: 1px solid #0D3347;
  border-radius: 8px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.product-mini:hover {
  border-color: #00ED64;
  background: rgba(0,237,100,0.05);
}
.product-mini-name { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 2px; }
.product-mini-tag { font-size: 0.7rem; color: #00ED64; }

.detail-panel {
  background: #082231;
  border: 1px solid #0D3347;
  border-radius: 10px;
  padding: 24px;
}

/* ── Typography ── */
.label {
  font-size: 0.67rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #7AACBD;
  margin-bottom: 6px;
}
.value-text { font-size: 0.875rem; color: #D0E8F0; margin-bottom: 14px; line-height: 1.65; }

.fact-list { list-style: none; padding: 0; margin-bottom: 14px; }
.fact-list li {
  font-size: 0.82rem;
  color: #B8D8E8;
  padding: 5px 0 5px 18px;
  position: relative;
  border-bottom: 1px solid rgba(13,51,71,0.6);
}
.fact-list li::before { content: "→"; position: absolute; left: 0; color: #00ED64; }
.fact-list li:last-child { border-bottom: none; }

/* ── Badges ── */
.badge {
  display: inline-block;
  font-size: 0.63rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  margin-right: 6px;

.badge-REPLACE { background: rgba(255,82,82,0.12);  color: #FF6B6B;  border: 1px solid rgba(255,82,82,0.25); }
.badge-LAUNCH  { background: rgba(255,153,0,0.12);  color: #FF9900;  border: 1px solid rgba(255,153,0,0.25); }
.badge-MIGRATE { background: rgba(100,160,255,0.12); color: #7EB8FF; border: 1px solid rgba(100,160,255,0.25); }

/* ── Play toggles ── */
.play-toggles { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.play-toggle-btn {
  background: #0D3347;
  border: 1px solid #1A4A63;
  color: #7AACBD;

  font-weight: 600;
  padding: 7px 14px;
  border-radius: 6px;

.play-toggle-btn.active-replace { background: rgba(255,82,82,0.08); border-color: #FF6B6B; color: #FF6B6B; }
.play-toggle-btn.active-launch  { background: rgba(255,153,0,0.08); border-color: #FF9900; color: #FF9900; }
.play-toggle-btn.active-migrate { background: rgba(100,160,255,0.08); border-color: #7EB8FF; color: #7EB8FF; }

.play-card { background: #0A1E2B; border: 1px solid #0D3347; border-radius: 10px; padding: 20px; }
.play-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.play-title { font-size: 1rem; font-weight: 700; color: #fff; }
.play-industry { font-size: 0.75rem; color: #7AACBD; margin-bottom: 14px; }
.play-section { margin-bottom: 12px; }
.play-section-label {

  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #00ED64;
  margin-bottom: 4px;

.play-section-text { font-size: 0.85rem; color: #D0E8F0; line-height: 1.6; }

/* ── Product chips ── */
.chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px; }
.chip {
  background: #0D3347;
  border: 1px solid #1A4A63;
  color: #7AACBD;
  font-size: 0.71rem;
  padding: 3px 10px;
  border-radius: 20px;

/* ── One-liner ── */
.one-liner {
  background: rgba(0,237,100,0.07);
  border: 1px solid rgba(0,237,100,0.2);

  background: #0D3347;
  border: 1px solid #1A4A63;
  color: #B8D8E8;

/* ── Objections ── */
.objection { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #0D3347; }
.objection:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.objection-a { font-size: 0.83rem; color: #D0E8F0; line-height: 1.6; }

/* ── Divider ── */
.divider { border: none; border-top: 1px solid #0D3347; margin: 16px 0; }

/* ── Back button ── */
.back-btn {
  background: none; border: none; color: #7AACBD;
  font-size: 0.82rem; cursor: pointer;
  padding: 0 0 16px;
  display: inline-flex; align-items: center; gap: 6px;

/* ── Category label ── */

  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #7AACBD;
  margin-bottom: 6px;
}

.hidden { display: none !important; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #00131A; }
::-webkit-scrollbar-thumb { background: #0D3347; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #1A4A63; }
</style>

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let currentPersonaId = null;
let activePlayIdx = 0;

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function productName(id) {
  const p = PRODUCTS.find(x => x.id === id);
  return p ? p.name : id;
}
function badge(type) {
  return `<span class="badge badge-${esc(type)}">${esc(type)}</span>`;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function navigate(id) {
  currentPersonaId = id;
  activePlayIdx = 0;

  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');

  if (id === 'products') {
    document.getElementById('view-products').classList.remove('hidden');
    document.getElementById('view-persona').classList.add('hidden');
    document.getElementById('product-grid').classList.remove('hidden');
    document.getElementById('product-detail').classList.add('hidden');
    renderProductGrid();
  } else {
    document.getElementById('view-products').classList.add('hidden');
    document.getElementById('view-persona').classList.remove('hidden');
    renderPersona(id, 0);
  }
}

// ═══════════════════════════════════════════════════════════
// PRODUCTS VIEW
// ═══════════════════════════════════════════════════════════
function renderProductGrid() {
  document.getElementById('product-grid').innerHTML = PRODUCTS.map(p => `
    <div class="product-mini" onclick="openProduct('${esc(p.id)}')">
      <div class="product-mini-name">${esc(p.name)}</div>
      <div class="product-mini-tag">${esc(p.tagline)}</div>
    </div>
  `).join('');
}

function openProduct(id) {
  const p = PRODUCTS.find(x => x.id === id);
  if (!p) return;
  document.getElementById('product-grid').classList.add('hidden');
  document.getElementById('product-detail').classList.remove('hidden');
  document.getElementById('product-detail-inner').innerHTML = `
    <div class="detail-panel">
      <div class="card-title" style="font-size:1.2rem;margin-bottom:4px;">${esc(p.name)}</div>
      <div class="card-tagline">${esc(p.tagline)}</div>
      <hr class="divider"/>
      <div class="label">What It Is</div>
      <div class="value-text">${esc(p.what)}</div>
      <div class="label">So What — Why It Matters</div>
      <div class="value-text">${esc(p.soWhat)}</div>
      <div class="label">Key Facts &amp; Talk Points</div>
      <ul class="fact-list">${p.keyFacts.map(f=>`<li>${esc(f)}</li>`).join('')}</ul>
    </div>
  `;
}

function closeProductDetail() {
  document.getElementById('product-grid').classList.remove('hidden');
  document.getElementById('product-detail').classList.add('hidden');
  renderProductGrid();
}

// ═══════════════════════════════════════════════════════════
// PERSONA VIEW
// ═══════════════════════════════════════════════════════════
function renderPersona(id, playIdx) {
  const p = PERSONAS.find(x => x.id === id);
  if (!p) return;
  activePlayIdx = playIdx;

  const catLabel = { si: 'SI Partner', cloud: 'Cloud Partner', customer: 'Customer' }[p.category] || '';
  const play = p.plays[playIdx];

  // Build toggle buttons
  const toggles = p.plays.map((pl, i) => {
    let activeClass = '';
    if (i === playIdx) {
      const m = { SELECT:'active', REPLACE:'active-replace', LAUNCH:'active-launch', MIGRATE:'active-migrate' };
      activeClass = m[pl.badge] || 'active';
    }
    return `<button class="play-toggle-btn ${activeClass}" onclick="switchPlay('${esc(id)}',${i})">
      ${badge(pl.badge)} ${esc(pl.label)}
    </button>`;
  }).join('');

  // Build active play card
  const playHTML = play ? `
    <div class="play-card">
      <div class="play-header">
        ${badge(play.badge)}
        <span class="play-title">${esc(play.label)}</span>
      </div>
      <div class="play-industry">Industry / Context: ${esc(play.industry)}</div>
      <div class="play-section">
        <div class="play-section-label">Situation</div>
        <div class="play-section-text">${esc(play.situation)}</div>
      </div>
      <div class="play-section">
        <div class="play-section-label">MongoDB Angle</div>
        <div class="play-section-text">${esc(play.mongoAngle)}</div>
      </div>
      <div class="play-section">
        <div class="play-section-label">Expected Outcome</div>
        <div class="play-section-text">${esc(play.expectedOutcome)}</div>
      </div>
      <div class="play-section" style="margin-bottom:0;">
        <div class="play-section-label" style="margin-bottom:6px;">Products in Play</div>
        <div class="chip-row">${play.products.map(pid=>`<span class="chip">${esc(productName(pid))}</span>`).join('')}</div>
      </div>
    </div>
  ` : '';

  document.getElementById('persona-inner').innerHTML = `
    <div class="category-tag">${esc(catLabel)}</div>
    <div class="section-heading">${esc(p.title)}</div>
    <div class="section-sub">${esc(p.company)}</div>

    <div class="one-liner">"${esc(p.oneLiner)}"</div>

    <div class="two-col" style="margin-bottom:14px;">
      <div class="card">
        <div class="label" style="margin-bottom:8px;">What They Care About</div>
        ${p.careAbout.map(c=>`<span class="pill">${esc(c)}</span>`).join('')}
      </div>
      <div class="card">
        <div class="label">Business Problem</div>
        <div class="value-text" style="margin-bottom:0;">${esc(p.businessProblem)}</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;">
      <div class="label">MongoDB Value Proposition</div>
      <div class="value-text" style="margin-bottom:0;">${esc(p.valueProp)}</div>
    </div>

    <div style="margin-bottom:18px;">
      <div class="label" style="margin-bottom:8px;">Relevant Products</div>
      <div class="chip-row">
        ${p.relevantProducts.map(pid=>`<span class="chip" style="cursor:pointer;" onclick="navigate('products');setTimeout(()=>openProduct('${esc(pid)}'),60);">${esc(productName(pid))}</span>`).join('')}
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <div class="label" style="margin-bottom:10px;">Example Plays — Toggle to see how the message changes by motion type</div>
      <div class="play-toggles">${toggles}</div>
      ${playHTML}
    </div>

    <div class="card">
      <div class="label" style="margin-bottom:14px;">Common Objections &amp; Responses</div>
      ${p.objections.map(o=>`
        <div class="objection">
          <div class="objection-q">Q: ${esc(o.q)}</div>
          <div class="objection-a">${esc(o.a)}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function switchPlay(personaId, idx) {
  activePlayIdx = idx;
  renderPersona(personaId, idx);
}
